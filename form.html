<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A form for submitting product reviews.">
    <meta name="author" content="Matheus Serafim">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <title>Product Review Form</title>
</head>

<body>
   <header>
    <h1>Product Review</h1> 
    </header>

    <main>
        <form method="get" action="review.html">
            <label for="productName">Select a product</label>
            <select name="productName" id="productName" required>
                <option value="" selected disabled>
                    Select a product
                </option>
            </select>

            <fieldset>
                <legend> Overall Rating</legend>

                <input type="radio" name="rating" id="rating1" value="1" required>
                <label for="rating1">☆</label>

                <input type="radio" name="rating" id="rating2" value="2">
                <label for="rating2">☆☆</label>

                <input type="radio" name="rating" id="rating3" value="3">
                <label for="rating3">☆☆☆</label>
                <input type="radio" name="rating" id="rating4" value="4">
                <label for="rating4">☆☆☆☆</label>

                <input type="radio" name="rating" id="rating5" value="5">
                <label for="rating5">☆☆☆☆☆</label>
            </fieldset>

            <label for="installDate">Installation Date</label>
            <input type="date" name="installDate" id="installDate" required>

            <fieldset class="features">
                <legend>Which features did you find useful in the product?
                    (Select all that apply)
                </legend>
                <div class="feature-item">
                    <input type="checkbox" name="features" id="Durability" value="Durability">
                    <label for="Durability">Durability</label>
                </div>
                <div class="feature-item">
                    <input type="checkbox" name="features" id="EaseOfUse" value="Ease of use">
                    <label for="EaseOfUse">Ease of use</label>
                </div>
                <div class="feature-item">
                    <input type="checkbox" name="features" id="Performance" value="Performance">
                    <label for="Performance">Performance</label>
                </div>
                <div class="feature-item">
                    <input type="checkbox" name="features" id="Design" value="Design">
                    <label for="Design">Design</label>
                </div>
            </fieldset>

            <label for="review">Review</label>
            <textarea name="review" id="review"></textarea>

            <label for="userName">Username</label>
            <input type="text" name="userName" id="userName">

            <input type="submit" value="Post Review">
        </form>

    </main>


<footer>
    <p>
    &copy;
    <span id="currentyear"></span>
    🪪Matheus Serafim. Brasil.
    </p>
    <p id="lastModified"></p>
</footer>
</body>
</html>
