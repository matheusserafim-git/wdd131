<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasil</title>
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">   
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Brasil</h1>
    </header>
    <main>
        <div class="orla">
        <picture>
            <source srcset="images/orla-small.webp" media="(max-width: 500px)">
            <source srcset="images/orla-medium.webp" media="(min-width: 500px)">
            <img src="images/orla-large.webp" alt="Tucano bird in a tree looking to the horizon" width="1200" height="800">
        </picture>
        <section class="card data">
            <h2>Data</h2>
            <ul>
                <li><strong>Population:</strong> 214 million</li>
                <li><strong>Area:</strong> 8.5 million km²</li>
                <li><strong>Capital:</strong> Brasília</li>
                <li><strong>Official Language:</strong> Portuguese</li>
            </ul>

        </section>
        <section class="card weather">
            <h2>Weather</h2>
            <p>temperature: 25°C</p>
            <p>humidity: 80%</p>
            <p>wind speed: 10 km/h</p>
        </section>
        </div>
    </main>
</body>
</html>
