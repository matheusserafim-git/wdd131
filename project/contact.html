<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Discover Porto Alegre</title>
    <meta name="description" content="Discover Porto Alegre is a website dedicated to showcasing the best of Porto Alegre." />
    <meta name="author" content="Matheus Serafim" />
    <link rel="stylesheet" href="/project/styles/discoverPOA.css">
    <script src="project/scripts/contact.js" defer></script>
</head>

<body>

<header>
    <div class="left-header">
        <div class="logo-container">
            <img src="/images/logo.svg" alt="Discover Porto Alegre Logo">
            <div class="site-title">
                <span>DISCOVER</span>
                <span>PORTO ALEGRE</span>
            </div>
        </div>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="attractions.html">Attractions</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="contact-hero">
        <h1>Contact Us</h1>
        <p>
            Have questions about Porto Alegre attractions?
            Send us a message.
        </p>
    </section>

    <section class="contact-container">

        <form id="contact-form">

            <label for="name">Name</label>
            <input
                type="text"
                id="name"
                name="name"
                required>

            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                name="email"
                required>

            <label for="subject">Subject</label>
            <input
                type="text"
                id="subject"
                name="subject"
                required>

            <label for="message">Message</label>
            <textarea
                id="message"
                name="message"
                rows="6"
                required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

        <div id="confirmation-message"></div>

    </section>

</main>

<footer>
    <p>&copy; 2026 Discover Porto Alegre</p>
</footer>

</body>
</html>
